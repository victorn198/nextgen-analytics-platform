version: 2

sources:
  - name: raw
    description: Raw tables in PostgreSQL (landing zone). In this project, dbt starts from these sources.
    database: "{{ env_var('POSTGRES_DB', 'analytics') }}"
    schema: raw

    tables:
      - name: ORDERS
        identifier: orders_raw
        columns:
          - name: ORDER_ID
            tests: [not_null]
          - name: CUSTOMER_ID
            tests: [not_null]
          - name: PRODUCT_ID
            tests: [not_null]

      - name: CUSTOMERS
        identifier: customers_raw
        columns:
          - name: CUSTOMER_ID
            tests: [not_null]

      - name: PRODUCTS
        identifier: products_raw
        columns:
          - name: PRODUCT_ID
            tests: [not_null]

      - name: MARKETING_CAMPAIGNS
        identifier: marketing_campaigns_raw
        description: Registered CSV source landed in raw with load metadata.
        loaded_at_field: loaded_at
        freshness:
          warn_after: {count: 48, period: hour}
          error_after: {count: 96, period: hour}
        columns:
          - name: campaign_id
            tests: [not_null]
          - name: load_batch_id
            tests: [not_null]

      - name: SUPPORT_TICKETS
        identifier: support_tickets_raw
        description: Registered JSON source landed in raw with load metadata.
        loaded_at_field: loaded_at
        freshness:
          warn_after: {count: 48, period: hour}
          error_after: {count: 96, period: hour}
        columns:
          - name: ticket_id
            tests: [not_null]
          - name: load_batch_id
            tests: [not_null]

      - name: CRM_ACCOUNTS
        identifier: crm_accounts_raw
        description: Registered paginated CRM-style API source landed in raw with load metadata.
        loaded_at_field: loaded_at
        freshness:
          warn_after: {count: 48, period: hour}
          error_after: {count: 96, period: hour}
        columns:
          - name: account_id
            tests: [not_null]
          - name: load_batch_id
            tests: [not_null]

      - name: BILLING_INVOICES
        identifier: billing_invoices_raw
        description: Registered billing invoices API-style source landed in raw with load metadata.
        loaded_at_field: loaded_at
        freshness:
          warn_after: {count: 48, period: hour}
          error_after: {count: 96, period: hour}
        columns:
          - name: invoice_id
            tests: [not_null]
          - name: load_batch_id
            tests: [not_null]

models:
  - name: stg_orders
    description: Standardized orders from RAW. Applies typing/renames and keeps a 1:1 shape with the source.
    columns:
      - name: order_id
        description: Business identifier of the order.
        tests: [unique, not_null]
      - name: customer_id
        description: Business identifier of the customer who placed the order.
        tests: [not_null]
      - name: product_id
        description: Business identifier of the purchased product.
        tests: [not_null]
      - name: order_date
        description: Date/time when the order was created.
        tests: [not_null]
      - name: status
        description: Order status from the source system.
        tests:
          - accepted_values:
              arguments:
                values: ["pending", "paid", "cancelled", "shipped", "completed"]

  - name: stg_customers
    description: Standardized customers from RAW.
    columns:
      - name: customer_id
        description: Business identifier of the customer.
        tests: [unique, not_null]

  - name: stg_products
    description: Standardized products from RAW.
    columns:
      - name: product_id
        description: Business identifier of the product.
        tests: [unique, not_null]

  - name: stg_marketing_campaigns
    description: Standardized marketing campaigns loaded from the registered CSV source.
    columns:
      - name: campaign_id
        description: Business identifier of the marketing campaign.
        tests: [unique, not_null]
      - name: channel
        description: Campaign acquisition channel.
        tests:
          - accepted_values:
              arguments:
                values: ["paid_search", "email", "paid_social", "display"]
      - name: spend
        description: Campaign spend after source cleaning.
        tests: [not_null]
      - name: load_batch_id
        description: Source load batch that produced the row.
        tests: [not_null]

  - name: stg_support_tickets
    description: Standardized support tickets loaded from the registered JSON source.
    columns:
      - name: ticket_id
        description: Business identifier of the support ticket.
        tests: [unique, not_null]
      - name: customer_id
        description: Customer attached to the support ticket.
        tests: [not_null]
      - name: priority
        description: Ticket priority from the source system.
        tests:
          - accepted_values:
              arguments:
                values: ["low", "medium", "high"]
      - name: load_batch_id
        description: Source load batch that produced the row.
        tests: [not_null]

  - name: stg_crm_accounts
    description: Standardized CRM accounts loaded from the registered paginated API source.
    columns:
      - name: account_id
        description: Business identifier of the CRM account.
        tests: [unique, not_null]
      - name: lifecycle_stage
        description: CRM lifecycle stage for the account.
        tests:
          - accepted_values:
              arguments:
                values: ["lead", "opportunity", "customer"]
      - name: annual_revenue
        description: CRM account annual revenue proxy after source cleaning.
        tests: [not_null]
      - name: load_batch_id
        description: Source load batch that produced the row.
        tests: [not_null]

  - name: stg_billing_invoices
    description: Standardized billing invoices loaded from the registered paginated API source.
    columns:
      - name: invoice_id
        description: Business identifier of the invoice.
        tests: [unique, not_null]
      - name: customer_id
        description: Customer billed on the invoice.
        tests: [not_null]
      - name: billing_status
        description: Current billing status from the source system.
        tests:
          - accepted_values:
              arguments:
                values: ["paid", "open", "paid_late", "past_due", "void"]
      - name: amount_due
        description: Amount expected from the customer.
        tests: [not_null]
      - name: load_batch_id
        description: Source load batch that produced the row.
        tests: [not_null]

  - name: dim_customer
    description: Customer dimension (one row per customer).
    columns:
      - name: customer_key
        description: Surrogate key for the customer dimension.
        tests: [unique, not_null]
      - name: customer_id
        description: Natural/business key from the source system.
        tests: [unique, not_null]

  - name: dim_product
    description: Product dimension (one row per product).
    columns:
      - name: product_key
        description: Surrogate key for the product dimension.
        tests: [unique, not_null]
      - name: product_id
        description: Natural/business key from the source system.
        tests: [unique, not_null]

  - name: fct_sales
    description: "Sales fact table (grain: one row per order_id). sales_amount is net of cancelled orders; gross_sales_amount keeps the raw order value."
    columns:
      - name: sales_key
        description: Surrogate key of the fact table row.
        tests: [unique, not_null]

      - name: order_id
        description: Business identifier of the order represented by this fact row.
        tests: [unique, not_null]

      - name: customer_key
        description: Foreign key to dim_customer.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key

      - name: product_key
        description: Foreign key to dim_product.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_key

      - name: gross_sales_amount
        description: Raw order value before cancellation adjustment.
        tests: [not_null]

      - name: sales_amount
        description: Net sales amount used by dashboard revenue KPIs; cancelled orders contribute zero.
        tests: [not_null]

      - name: cancelled_sales_amount
        description: Order value removed from net sales because the order was cancelled.
        tests: [not_null]

      - name: is_cancelled
        description: Boolean flag identifying cancelled orders.
        tests: [not_null]

      - name: status
        description: Normalized order status used for operational quality metrics.
        tests:
          - accepted_values:
              arguments:
                values: ["pending", "paid", "cancelled", "shipped", "completed"]

  - name: mart_account_health
    description: Account-level operational mart combining CRM, billing, support, and ecommerce activity.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "health_score between 0 and 100"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "outstanding_amount <= billed_amount"
    columns:
      - name: account_id
        description: Business identifier of the CRM account.
        tests: [unique, not_null]
      - name: account_name
        description: CRM account name.
        tests: [not_null]
      - name: lifecycle_stage
        description: CRM lifecycle stage used as a context dimension.
        tests:
          - accepted_values:
              arguments:
                values: ["lead", "opportunity", "customer"]
      - name: health_score
        description: Operational account health score from billing and support risk signals.
        tests: [not_null]
      - name: health_tier
        description: Account health tier derived from the score.
        tests:
          - accepted_values:
              arguments:
                values: ["healthy", "watch", "risk"]
      - name: primary_risk_driver
        description: Highest-priority operational follow-up reason.
        tests:
          - accepted_values:
              arguments:
                values: ["billing_risk", "support_risk", "commercial_follow_up", "stable"]

  - name: mart_marketing_efficiency
    description: Campaign-level marketing efficiency mart with city/date-window revenue attribution.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "spend >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "budget >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "attributed_revenue >= 0"
    columns:
      - name: campaign_id
        description: Business identifier of the marketing campaign.
        tests: [unique, not_null]
      - name: channel
        description: Acquisition channel used for marketing efficiency analysis.
        tests:
          - accepted_values:
              arguments:
                values: ["paid_search", "email", "paid_social", "display"]
      - name: spend
        description: Campaign spend.
        tests: [not_null]
      - name: attributed_revenue
        description: Net sales attributed by campaign target city and campaign active date window.
        tests: [not_null]
      - name: roas
        description: Attributed revenue divided by spend.
