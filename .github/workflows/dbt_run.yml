name: dbt Core CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt_run:
    name: Run dbt models and tests
    runs-on: ubuntu-latest
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_SCHEMA: raw
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/analytics
      PYTHONPATH: ${{ github.workspace }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: analytics
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d analytics"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup dbt profiles
        run: |
          mkdir -p ~/.dbt/
          cat <<'EOF' > ~/.dbt/profiles.yml
          data_pipeline:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                user: postgres
                password: postgres
                port: 5432
                dbname: analytics
                schema: raw
                threads: 4
                keepalives_idle: 0
          EOF

      - name: Setup PostgreSQL schemas
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql "postgresql://postgres:postgres@localhost:5432/analytics" -f scripts/setup_postgres.sql

      - name: Load sample RAW data
        env:
          PIPELINE_LOAD_MODE: full_refresh
        run: python scripts/loadsampledata.py

      - name: Load registered source data
        run: python scripts/load_registered_sources.py

      - name: Run dbt deps
        run: dbt deps
        working-directory: ./dbtproject

      - name: Run dbt models
        run: dbt run
        working-directory: ./dbtproject

      - name: Run dbt snapshots
        run: dbt snapshot
        working-directory: ./dbtproject

      - name: Run dbt tests
        run: dbt test
        working-directory: ./dbtproject

      - name: Run NextGen dashboard API tests
        run: pytest tests/test_nextgen_dashboard_api.py

      - name: Run NextGen dashboard metric audit
        run: python scripts/audit_dashboard_metrics.py --summary-only

      - name: Run NextGen dashboard benchmark
        run: python scripts/benchmark_dashboard.py --threshold-seconds 1.50

