#:schema https://developers.openai.com/codex/config-schema.json

# Project-local Codex defaults inspired by ECC, adapted to the security posture
# of this repository.

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

persistent_instructions = """
Follow AGENTS.md and .codex/AGENTS.md.
Use .agents/workflows and .agents/skills when they improve correctness.
Keep the change surface narrow, preserve KPI semantics, and validate before closing work.
"""

[features]
multi_agent = true

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only code and data-flow explorer for this analytics repository."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Read-only reviewer focused on KPI correctness, security, regressions, and missing tests."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Verify API and framework behavior against primary documentation before changes land."
config_file = "agents/docs-researcher.toml"

[agents.security_reviewer]
description = "Security-focused reviewer for auth, SQL, XSS, secrets, and toolchain changes."
config_file = "agents/security-reviewer.toml"

